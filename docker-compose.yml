services:
  # 1. 数据库服务
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=crypto_monitor
    restart: always

  # 2. 后端服务
  backend:
    build: ./backend
    # 注意：这里改成了 expose，不再直接把 8000 暴露给电脑，而是暴露给 Caddy
    expose:
      - "8000"
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/crypto_monitor
      - CMC_API_KEY=${CMC_API_KEY}
    depends_on:
      - db
    restart: always

  # 3. 前端服务
  frontend:
    # ✅ 改用直接镜像
    image: node:20
    working_dir: /app
    # 这里的 command 是关键，它会在容器启动时安装依赖并运行
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    expose:
      - "5173"
    environment:
      - VITE_API_URL=/api
    depends_on:
      - backend
    restart: always

  # 4. Caddy 网关服务 (新增的!)
  caddy:
    image: caddy:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - frontend
    restart: always

volumes:
  postgres_data:
  caddy_data:
  caddy_config: