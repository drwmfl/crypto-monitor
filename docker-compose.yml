services:
  redis:
    image: redis:alpine
    container_name: crypto_redis
    restart: always
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data

  streamer:
    build: ./apps/market_monitor/backend
    image: crypto-monitor-backend:latest
    container_name: crypto_streamer
    restart: always
    command: python stream_collector.py
    volumes:
      - ./apps/market_monitor/backend:/app
      - ./packages:/workspace/packages:ro
    environment:
      - PYTHONPATH=/workspace
      - HTTP_PROXY=${ALERT_HTTP_PROXY}
      - HTTPS_PROXY=${ALERT_HTTPS_PROXY}
      - NO_PROXY=${ALERT_NO_PROXY}
      - http_proxy=${ALERT_HTTP_PROXY}
      - https_proxy=${ALERT_HTTPS_PROXY}
      - no_proxy=${ALERT_NO_PROXY}
    depends_on:
      - redis

  alert_monitor:
    build: ./apps/market_monitor/backend
    image: crypto-monitor-backend:latest
    container_name: crypto_alert_monitor
    restart: always
    command: python alert_monitor.py
    volumes:
      - ./apps/market_monitor/backend:/app
      - ./packages:/workspace/packages:ro
      - ./utils:/app/utils
      - ./apps/market_monitor/config:/app/config:ro
      - ./data/runtime/market_monitor:/runtime
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - TELEGRAM_SEND_MAX_ATTEMPTS=${TELEGRAM_SEND_MAX_ATTEMPTS}
      - TELEGRAM_SEND_RETRY_DELAY_SEC=${TELEGRAM_SEND_RETRY_DELAY_SEC}
      - TELEGRAM_SEND_CONNECT_TIMEOUT_SEC=${TELEGRAM_SEND_CONNECT_TIMEOUT_SEC}
      - TELEGRAM_SEND_READ_TIMEOUT_SEC=${TELEGRAM_SEND_READ_TIMEOUT_SEC}
      - TELEGRAM_SEND_WRITE_TIMEOUT_SEC=${TELEGRAM_SEND_WRITE_TIMEOUT_SEC}
      - TELEGRAM_SEND_POOL_TIMEOUT_SEC=${TELEGRAM_SEND_POOL_TIMEOUT_SEC}
      - TELEGRAM_RETRY_QUEUE_ENABLED=${TELEGRAM_RETRY_QUEUE_ENABLED}
      - TELEGRAM_RETRY_QUEUE_MAX_SIZE=${TELEGRAM_RETRY_QUEUE_MAX_SIZE}
      - TELEGRAM_RETRY_MAX_ATTEMPTS=${TELEGRAM_RETRY_MAX_ATTEMPTS}
      - TELEGRAM_RETRY_BASE_DELAY_SEC=${TELEGRAM_RETRY_BASE_DELAY_SEC}
      - TELEGRAM_RETRY_MAX_DELAY_SEC=${TELEGRAM_RETRY_MAX_DELAY_SEC}
      - TELEGRAM_RETRY_WORKERS=${TELEGRAM_RETRY_WORKERS}
      - TELEGRAM_RETRY_QUEUE_FILE=/runtime/telegram_retry_queue.json
      - TELEGRAM_RETRY_FAILED_FILE=/runtime/telegram_retry_failed.jsonl
      - TELEGRAM_DAILY_COUNT_FILE=/runtime/telegram_daily_counts.json
      - ALERT_CONFIG_PATH=/app/config/config.json
      - ALERT_REDIS_URL=redis://redis:6379/0
      - ALERT_USE_REDIS_COOLDOWN=true
      - PYTHONPATH=/workspace
      - ALERT_TELEGRAM_ENABLED=${ALERT_TELEGRAM_ENABLED}
      - ALERT_SEND_LOW_PRIORITY=${ALERT_SEND_LOW_PRIORITY}
      - ALERT_STRATEGY_ENABLED=${ALERT_STRATEGY_ENABLED:-}
      - ALERT_DIRECT_TG_ENABLED=${ALERT_DIRECT_TG_ENABLED:-}
      - ALERT_STRATEGY_RUNTIME_DIR=/runtime
      - ALERT_STRATEGY_JSON=${ALERT_STRATEGY_JSON:-}
      - ALERT_STRATEGY_MIN_WATCH_SCORE=${ALERT_STRATEGY_MIN_WATCH_SCORE:-}
      - ALERT_STRATEGY_MIN_ACTIONABLE_SCORE=${ALERT_STRATEGY_MIN_ACTIONABLE_SCORE:-}
      - ALERT_STRATEGY_MAX_WATCH_RISK=${ALERT_STRATEGY_MAX_WATCH_RISK:-}
      - ALERT_STRATEGY_MAX_ACTIONABLE_RISK=${ALERT_STRATEGY_MAX_ACTIONABLE_RISK:-}
      - ALERT_STRATEGY_RISK_ALERT_SCORE=${ALERT_STRATEGY_RISK_ALERT_SCORE:-}
      - ALERT_STRATEGY_CANDIDATE_TTL_MINUTES=${ALERT_STRATEGY_CANDIDATE_TTL_MINUTES:-}
      - ALERT_STRATEGY_GLOBAL_MAX_10M=${ALERT_STRATEGY_GLOBAL_MAX_10M:-}
      - ALERT_STRATEGY_GLOBAL_MAX_HOUR=${ALERT_STRATEGY_GLOBAL_MAX_HOUR:-}
      - ALERT_CONFIRMATION_FACTORS_ENABLED=${ALERT_CONFIRMATION_FACTORS_ENABLED:-}
      - ALERT_CONFIRMATION_MIN_BASE_SCORE=${ALERT_CONFIRMATION_MIN_BASE_SCORE:-}
      - ALERT_CONFIRMATION_CACHE_TTL_SEC=${ALERT_CONFIRMATION_CACHE_TTL_SEC:-}
      - ALERT_BINANCE_FACTORS_ENABLED=${ALERT_BINANCE_FACTORS_ENABLED:-}
      - ALERT_BINANCE_FACTOR_TIMEOUT_SEC=${ALERT_BINANCE_FACTOR_TIMEOUT_SEC:-}
      - ALERT_BINANCE_FETCH_LIQUIDATIONS=${ALERT_BINANCE_FETCH_LIQUIDATIONS:-true}
      - ALERT_ATR_ENABLED=${ALERT_ATR_ENABLED}
      - ALERT_ATR_PERIOD=${ALERT_ATR_PERIOD}
      - ALERT_POLL_INTERVAL_SEC=${ALERT_POLL_INTERVAL_SEC}
      - ALERT_WINDOWS=${ALERT_WINDOWS}
      - ALERT_SYMBOLS=${ALERT_SYMBOLS}
      - ALERT_DEFAULT_COOLDOWN_MINUTES=${ALERT_DEFAULT_COOLDOWN_MINUTES}
      - ALERT_HIGH_PRIORITY_EXTRA_MINUTES=${ALERT_HIGH_PRIORITY_EXTRA_MINUTES}
      - ALERT_LOG_LEVEL=${ALERT_LOG_LEVEL}
      - ALERT_TIMEZONE=${ALERT_TIMEZONE}
      - ALERT_KLINE_LIMIT=${ALERT_KLINE_LIMIT}
      - ALERT_VOLUME_LOOKBACK=${ALERT_VOLUME_LOOKBACK}
      - ALERT_CLOSE_CANDLE_ONLY=${ALERT_CLOSE_CANDLE_ONLY}
      - ALERT_MAX_CONCURRENT_REQUESTS=${ALERT_MAX_CONCURRENT_REQUESTS}
      - ALERT_SYMBOL_UNIVERSE_MODE=${ALERT_SYMBOL_UNIVERSE_MODE}
      - ALERT_UNIVERSE_REFRESH_SEC=${ALERT_UNIVERSE_REFRESH_SEC}
      - ALERT_EXCLUDE_SYMBOLS=${ALERT_EXCLUDE_SYMBOLS}
      - ALERT_INCLUDE_SYMBOLS=${ALERT_INCLUDE_SYMBOLS}
      - ALERT_MIN_QUOTE_VOLUME_USDT=${ALERT_MIN_QUOTE_VOLUME_USDT}
      - ALERT_MAX_QUOTE_VOLUME_USDT=${ALERT_MAX_QUOTE_VOLUME_USDT}
      - ALERT_EXCLUDE_TOP_QUOTE_VOLUME_ENABLED=${ALERT_EXCLUDE_TOP_QUOTE_VOLUME_ENABLED}
      - ALERT_EXCLUDE_TOP_QUOTE_VOLUME_N=${ALERT_EXCLUDE_TOP_QUOTE_VOLUME_N}
      - ALERT_MAX_SYMBOLS=${ALERT_MAX_SYMBOLS}
      - ALERT_WINDOW_SCHEDULE_ENABLED=${ALERT_WINDOW_SCHEDULE_ENABLED}
      - ALERT_SYMBOL_BATCH_SIZE=${ALERT_SYMBOL_BATCH_SIZE}
      - ALERT_FULL_SCAN_WINDOWS=${ALERT_FULL_SCAN_WINDOWS}
      - ALERT_SYMBOL_BATCH_SIZE_BY_WINDOW_JSON=${ALERT_SYMBOL_BATCH_SIZE_BY_WINDOW_JSON}
      - ALERT_PRIORITY_SCAN_ENABLED=${ALERT_PRIORITY_SCAN_ENABLED}
      - ALERT_PRIORITY_SCAN_TOP_N=${ALERT_PRIORITY_SCAN_TOP_N}
      - ALERT_PRIORITY_SCAN_WINDOWS=${ALERT_PRIORITY_SCAN_WINDOWS}
      - ALERT_PRIORITY_SCAN_MIN_24H_CHANGE_PCT=${ALERT_PRIORITY_SCAN_MIN_24H_CHANGE_PCT}
      - ALERT_SCAN_COVERAGE_FILE=${ALERT_SCAN_COVERAGE_FILE}
      - ALERT_SCAN_COVERAGE_FLUSH_SEC=${ALERT_SCAN_COVERAGE_FLUSH_SEC}
      - ALERT_WS_GAP_DETECTION_ENABLED=${ALERT_WS_GAP_DETECTION_ENABLED}
      - ALERT_WS_GAP_WINDOW=${ALERT_WS_GAP_WINDOW}
      - ALERT_WS_GAP_MIN_SILENCE_SEC=${ALERT_WS_GAP_MIN_SILENCE_SEC}
      - ALERT_WS_GAP_MIN_CHANGE_BY_WINDOW_JSON=${ALERT_WS_GAP_MIN_CHANGE_BY_WINDOW_JSON}
      - ALERT_WS_REALTIME_ENABLED=${ALERT_WS_REALTIME_ENABLED}
      - ALERT_WS_REALTIME_WINDOWS=${ALERT_WS_REALTIME_WINDOWS}
      - ALERT_WS_REALTIME_SKIP_POLL_WINDOWS=${ALERT_WS_REALTIME_SKIP_POLL_WINDOWS}
      - ALERT_WS_REALTIME_PREFILTER_PCT=${ALERT_WS_REALTIME_PREFILTER_PCT}
      - ALERT_WS_REALTIME_RECHECK_INTERVAL_SEC=${ALERT_WS_REALTIME_RECHECK_INTERVAL_SEC}
      - ALERT_WS_REALTIME_RECONNECT_SEC=${ALERT_WS_REALTIME_RECONNECT_SEC}
      - ALERT_WS_REALTIME_NO_MESSAGE_RECONNECT_SEC=${ALERT_WS_REALTIME_NO_MESSAGE_RECONNECT_SEC}
      - ALERT_WS_REALTIME_SUB_CHUNK_SIZE=${ALERT_WS_REALTIME_SUB_CHUNK_SIZE}
      - ALERT_WS_REALTIME_SYMBOL_REFRESH_SEC=${ALERT_WS_REALTIME_SYMBOL_REFRESH_SEC}
      - ALERT_WS_REALTIME_URL=${ALERT_WS_REALTIME_URL}
      - ALERT_WS_LOCAL_AGG_ENABLED=${ALERT_WS_LOCAL_AGG_ENABLED}
      - ALERT_WS_LOCAL_AGG_WINDOWS=${ALERT_WS_LOCAL_AGG_WINDOWS}
      - ALERT_WS_LOCAL_AGG_SKIP_POLL_WINDOWS=${ALERT_WS_LOCAL_AGG_SKIP_POLL_WINDOWS}
      - ALERT_WS_LOCAL_AGG_BOOTSTRAP_CONCURRENCY=${ALERT_WS_LOCAL_AGG_BOOTSTRAP_CONCURRENCY}
      - ALERT_WS_LOCAL_AGG_HISTORY_LIMIT=${ALERT_WS_LOCAL_AGG_HISTORY_LIMIT}
      - ALERT_STRATEGY_STRONG_DIRECT_ENABLED=${ALERT_STRATEGY_STRONG_DIRECT_ENABLED}
      - ALERT_STRATEGY_STRONG_DIRECT_WINDOWS=${ALERT_STRATEGY_STRONG_DIRECT_WINDOWS}
      - ALERT_STRATEGY_STRONG_DIRECT_CHANGE_BY_WINDOW_JSON=${ALERT_STRATEGY_STRONG_DIRECT_CHANGE_BY_WINDOW_JSON}
      - ALERT_STRATEGY_STRONG_DIRECT_COOLDOWN_MINUTES=${ALERT_STRATEGY_STRONG_DIRECT_COOLDOWN_MINUTES}
      - ALERT_EVENT_DEDUPE_ENABLED=${ALERT_EVENT_DEDUPE_ENABLED}
      - ALERT_EVENT_DEDUPE_STATE_FILE=${ALERT_EVENT_DEDUPE_STATE_FILE}
      - ALERT_EVENT_DEDUPE_WINDOW_MINUTES=${ALERT_EVENT_DEDUPE_WINDOW_MINUTES}
      - ALERT_EVENT_DEDUPE_MIN_ABS_CHANGE_DELTA_PCT=${ALERT_EVENT_DEDUPE_MIN_ABS_CHANGE_DELTA_PCT}
      - ALERT_EVENT_DEDUPE_MIN_RELATIVE_CHANGE_DELTA=${ALERT_EVENT_DEDUPE_MIN_RELATIVE_CHANGE_DELTA}
      - ALERT_EVENT_DEDUPE_MIN_SCORE_DELTA=${ALERT_EVENT_DEDUPE_MIN_SCORE_DELTA}
      - ALERT_EVENT_DEDUPE_MIN_RISK_DELTA=${ALERT_EVENT_DEDUPE_MIN_RISK_DELTA}
      - ALERT_EVENT_DEDUPE_FACTOR_UPGRADE_ENABLED=${ALERT_EVENT_DEDUPE_FACTOR_UPGRADE_ENABLED}
      - ALERT_EVENT_DEDUPE_WINDOW_UPGRADE_ENABLED=${ALERT_EVENT_DEDUPE_WINDOW_UPGRADE_ENABLED}
      - ALERT_EVENT_DEDUPE_WINDOW_UPGRADE_REQUIRES_SCORE_DELTA=${ALERT_EVENT_DEDUPE_WINDOW_UPGRADE_REQUIRES_SCORE_DELTA}
      - ALERT_EVENT_DEDUPE_REVERSAL_ENABLED=${ALERT_EVENT_DEDUPE_REVERSAL_ENABLED}
      - HTTP_PROXY=${ALERT_HTTP_PROXY}
      - HTTPS_PROXY=${ALERT_HTTPS_PROXY}
      - NO_PROXY=${ALERT_NO_PROXY}
      - http_proxy=${ALERT_HTTP_PROXY}
      - https_proxy=${ALERT_HTTPS_PROXY}
      - no_proxy=${ALERT_NO_PROXY}
    depends_on:
      - redis

  accumulation_scanner:
    build: ./apps/market_monitor/backend
    image: crypto-monitor-backend:latest
    container_name: crypto_accumulation_scanner
    restart: always
    command: python run_accumulation_pool_scheduler.py
    volumes:
      - ./apps/market_monitor/backend:/app
      - ./packages:/workspace/packages:ro
      - ./apps/market_monitor/config:/app/config:ro
      - ./data/runtime/market_monitor:/runtime
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - TELEGRAM_SEND_MAX_ATTEMPTS=${TELEGRAM_SEND_MAX_ATTEMPTS:-3}
      - TELEGRAM_SEND_RETRY_DELAY_SEC=${TELEGRAM_SEND_RETRY_DELAY_SEC:-1}
      - TELEGRAM_SEND_CONNECT_TIMEOUT_SEC=${TELEGRAM_SEND_CONNECT_TIMEOUT_SEC:-15}
      - TELEGRAM_SEND_READ_TIMEOUT_SEC=${TELEGRAM_SEND_READ_TIMEOUT_SEC:-20}
      - TELEGRAM_SEND_WRITE_TIMEOUT_SEC=${TELEGRAM_SEND_WRITE_TIMEOUT_SEC:-20}
      - TELEGRAM_SEND_POOL_TIMEOUT_SEC=${TELEGRAM_SEND_POOL_TIMEOUT_SEC:-15}
      - ALERT_CONFIG_PATH=/app/config/config.json
      - ALERT_STRATEGY_RUNTIME_DIR=/runtime
      - PYTHONPATH=/workspace
      - ACCUMULATION_SCANNER_HOUR=${ACCUMULATION_SCANNER_HOUR:-21}
      - ACCUMULATION_SCANNER_MINUTE=${ACCUMULATION_SCANNER_MINUTE:-0}
      - ACCUMULATION_SCANNER_MAX_ATTEMPTS=${ACCUMULATION_SCANNER_MAX_ATTEMPTS:-3}
      - ACCUMULATION_SCANNER_RETRY_DELAY_SEC=${ACCUMULATION_SCANNER_RETRY_DELAY_SEC:-1800}
      - ACCUMULATION_SCANNER_SUMMARY_LIMIT=${ACCUMULATION_SCANNER_SUMMARY_LIMIT:-20}
      - ACCUMULATION_SCANNER_CONCURRENCY=${ACCUMULATION_SCANNER_CONCURRENCY:-1}
      - ACCUMULATION_SCANNER_LOG_LEVEL=${ACCUMULATION_SCANNER_LOG_LEVEL:-INFO}
      - ACCUMULATION_SCANNER_SCAN_LOG_LEVEL=${ACCUMULATION_SCANNER_SCAN_LOG_LEVEL:-INFO}
      - HTTP_PROXY=${ALERT_HTTP_PROXY}
      - HTTPS_PROXY=${ALERT_HTTPS_PROXY}
      - NO_PROXY=${ALERT_NO_PROXY}
      - http_proxy=${ALERT_HTTP_PROXY}
      - https_proxy=${ALERT_HTTPS_PROXY}
      - no_proxy=${ALERT_NO_PROXY}

volumes:
  redis_data:
